<?xml version="1.0" encoding="UTF-8"?>
<!-- Monochrome hero SVG: scalable, high-contrast vehicle silhouette -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">NJ Car Rentals hero image</title>
  <desc id="desc">Monochrome car silhouette on a subtle textured background for the site hero.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0b0b" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" />
    </filter>
  </defs>

  <!-- Background subtle tone -->
  <rect width="100%" height="100%" fill="#0b0b0b" />

  <!-- Decorative fade (helps overlay readability) -->
  <rect width="100%" height="100%" fill="url(#g)" />

  <!-- Stylized car silhouette -->
  <g transform="translate(0,120) scale(1.1)" fill="#e6e6e6">
    <path d="M220 380h1160c12 0 22-8 26-19l58-160c4-11-1-22-12-26l-120-34c-24-7-48-10-73-10H381c-36 0-70 13-96 36L160 257c-12 9-15 26-7 39l67 120c6 11 18 18 31 18z" opacity="0.95"/>

    <!-- windows -->
    <path d="M420 220h520c22 0 40 15 40 34v18c0 19-18 34-40 34H470c-24 0-44-15-44-34v-18c0-19 20-34 44-34z" fill="#0b0b0b" opacity="0.6" />

    <!-- wheels -->
    <circle cx="420" cy="480" r="70" fill="#0b0b0b" />
    <circle cx="1180" cy="480" r="70" fill="#0b0b0b" />
    <circle cx="420" cy="480" r="40" fill="#8a8a8a" />
    <circle cx="1180" cy="480" r="40" fill="#8a8a8a" />
  </g>

  <!-- Slight grain overlay for texture (subtle) -->
  <rect width="100%" height="100%" fill="transparent" filter="url(#grain)" opacity="0.02" />
</svg>